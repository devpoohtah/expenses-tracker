<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simple offline expenses logger with PWA support">
    <title>Expenses Logger</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' };
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>
</head>
<body class="bg-gray-100 dark:bg-gray-950 text-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen">

    <!-- Header -->
    <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700 sticky top-0 z-40 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold text-lg">₱</div>
                <h1 class="text-xl font-bold">Expenses Logger</h1>
            </div>
            <div class="flex items-center gap-2">
                <button id="themeToggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-xl">🌙</button>
                <button id="settingsBtn" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors text-xl">⚙️</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8">

        <!-- Start Tracking / Budget Section -->
        <div class="bg-white dark:bg-gray-900 rounded-xl shadow p-6 mb-6 border border-gray-200 dark:border-gray-700">
            <h2 class="text-lg font-semibold mb-4">Start Expense Tracking</h2>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-6">
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Budget Amount</label>
                    <input id="budgetInput" type="number" min="0" placeholder="e.g. 5000"
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Event Name</label>
                    <input id="eventInput" type="text" placeholder="e.g. Guimaras Trip, Monthly"
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="flex items-end">
                    <button id="setBudgetBtn" class="w-full px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-colors">
                        Start Tracking
                    </button>
                </div>
            </div>

            <!-- Budget Summary Cards -->
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-1">Total Budget</p>
                    <p id="budgetDisplay" class="text-2xl font-bold text-indigo-600 dark:text-indigo-400">₱0.00</p>
                </div>
                <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-1">Total Spent</p>
                    <p id="grandTotalDisplay" class="text-2xl font-bold text-red-500 dark:text-red-400">₱0.00</p>
                </div>
                <div class="bg-gray-50 dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
                    <p class="text-sm text-gray-500 dark:text-gray-400 mb-1">Remaining</p>
                    <p id="budgetRemainingDisplay" class="text-2xl font-bold text-green-600 dark:text-green-400">₱0.00</p>
                </div>
            </div>
        </div>

        <!-- Log Expense Section -->
        <div class="bg-white dark:bg-gray-900 rounded-xl shadow p-6 mb-6 border border-gray-200 dark:border-gray-700">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold">Log Expense</h2>
                <button id="addExpenseBtn" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-lg transition-colors">
                    + Add Expense
                </button>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-4 gap-3">
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Category</label>
                    <input id="categoryInput" type="text" placeholder="e.g. Food, Transport"
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Outing / Event</label>
                    <input id="outingInput" type="text" placeholder="e.g. Weekend trip"
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Product / Item</label>
                    <input id="itemInput" type="text" placeholder="e.g. Gas, Food"
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 dark:text-gray-400 mb-1">Cost</label>
                    <input id="costInput" type="number" min="0" step="0.01" placeholder="0.00"
                        class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
        </div>

        <!-- Expense History Header + Export -->
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold">Expense History</h2>
            <button id="exportPdfBtn" class="px-5 py-2 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-lg transition-colors">
                📥 Export as PDF
            </button>
        </div>

        <!-- Expense History List -->
        <div class="bg-white dark:bg-gray-900 rounded-xl shadow p-6 border border-gray-200 dark:border-gray-700">
            <div id="expensesList">
                <p class="text-center text-gray-400 dark:text-gray-500 py-10">No expenses logged yet</p>
            </div>
        </div>

    </main>

    <!-- Settings Modal -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-gray-900 rounded-xl shadow-xl w-full max-w-sm p-6 border border-gray-200 dark:border-gray-700">
            <h2 class="text-xl font-bold mb-4">Settings</h2>
            <button id="clearAllBtn" class="w-full py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors mb-3">
                🗑️ Clear All Expenses
            </button>
            <button id="closeSettingsBtn" class="w-full py-2 bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 font-semibold rounded-lg transition-colors">
                Close
            </button>
        </div>
    </div>

    <!-- Confirm Clear Modal -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white dark:bg-gray-900 rounded-xl shadow-xl w-full max-w-sm p-6 border border-gray-200 dark:border-gray-700">
            <h2 class="text-xl font-bold mb-1">Are you sure?</h2>
            <p class="text-gray-500 dark:text-gray-400 mb-5 text-sm">This will permanently delete all expenses. Don't forget to export first!</p>
            <div class="flex flex-col gap-2">
                <button id="exportBeforeClearBtn" class="w-full py-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-lg transition-colors">
                    📥 Export First
                </button>
                <button id="confirmClearBtn" class="w-full py-2 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors">
                    Yes, Clear All
                </button>
                <button id="cancelClearBtn" class="w-full py-2 bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 font-semibold rounded-lg transition-colors">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('js/sw.js').catch(err => console.log('SW failed:', err));
        }
    </script>
</body>
</html>
